name: Ollm GCP Deploy (Keyless)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Build & Push
        run: |
          echo "VITE_API_URL=https://ollm.everydaystudio.xyz" > apps/frontend/.env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_FRONTEND_GOOGLE_CLIENT_ID }}" >> apps/frontend/.env
          touch apps/backend/.env
          docker compose -f apps/backend/docker-compose.yaml build
          docker compose -f apps/backend/docker-compose.yaml push
          docker compose -f apps/frontend/docker-compose.yaml build
          docker compose -f apps/frontend/docker-compose.yaml push

      - name: 🔐 Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🚀 SSH into GCP VM and Deploy
        run: |
          gcloud compute ssh ${{ secrets.GCP_SSH_USER }}@${{ secrets.GCP_INSTANCE_NAME }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --zone=${{ secrets.GCP_INSTANCE_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --command="
              cd ${{ secrets.APP_WORKDIR }} && \
              git pull origin main && \
              docker compose pull
              docker compose up -d
            "
