name: Ollm GCP Deploy (Keyless)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🚀 SSH into GCP VM and Deploy
        run: |
          gcloud compute ssh ${{ secrets.GCP_SSH_USER }}@${{ secrets.GCP_INSTANCE_NAME }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --zone=${{ secrets.GCP_INSTANCE_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --command="cd ${{ secrets.APP_WORKDIR }} && git pull origin main && docker compose up -d --build"