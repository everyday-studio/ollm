version: '3.8'

include:
  - apps/backend/docker-compose.yaml
  - apps/frontend/docker-compose.yaml

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

volumes:
  caddy_data:
  caddy_config: