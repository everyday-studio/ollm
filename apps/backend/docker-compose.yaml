version: '3.8'

services:
  db:
    image: postgres:18.1
    restart: always # 서버 재부팅 시 자동 실행
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mydb
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/everyday-studio/ollm-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - '8080:8080'
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV}
      - DB_HOST=db
      - DB_NAME=mydb
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcp-key.json
    volumes:
      - ./gcp-key.json:/run/secrets/gcp-key.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: